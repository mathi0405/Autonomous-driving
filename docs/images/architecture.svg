<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b97a7"/>
    </marker>
    <style>
      .card{fill:#171c24;stroke:#232a34;stroke-width:1.5;rx:12}
      .lbl{fill:#e8edf3;font-size:14px;font-weight:600}
      .sub{fill:#8b97a7;font-size:11px}
      .tag{font-size:11px;font-weight:600}
      .flow{stroke:#8b97a7;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .band{fill:#8b97a7;font-size:11px;font-weight:700;letter-spacing:1px}
    </style>
  </defs>

  <rect width="980" height="660" fill="#0e1116"/>
  <text x="40" y="40" fill="#e8edf3" font-size="20" font-weight="700">Autonomous Driving with Deep RL — System Architecture</text>
  <text x="40" y="60" class="sub">One Gymnasium interface, two backends (CARLA + fast fallback); PPO &amp; SAC; classical baselines; full eval + CI/CD.</text>

  <!-- ENVIRONMENTS -->
  <text x="40" y="90" class="band">ENVIRONMENTS · shared Gym interface</text>
  <rect x="40" y="100" width="250" height="120" rx="12" class="card" stroke="#36c98d"/>
  <text x="60" y="126" class="lbl">CARLA Server</text>
  <text x="60" y="146" class="sub">Unreal Engine simulator (GPU)</text>
  <text x="60" y="166" class="sub">Sensors: RGB cam · collision</text>
  <text x="60" y="182" class="sub">· lane-invasion · waypoints</text>
  <text x="60" y="206" class="sub">vehicle.tesla.model3 · Town03</text>

  <rect x="310" y="100" width="250" height="120" rx="12" class="card" stroke="#36c98d"/>
  <text x="330" y="126" class="lbl">Fallback env</text>
  <text x="330" y="146" class="sub">Kinematic bicycle model</text>
  <text x="330" y="166" class="sub">No simulator · CPU · &lt;1ms/step</text>
  <text x="330" y="182" class="sub">Procedural lane + obstacles</text>
  <text x="330" y="206" class="sub">Top-down RGB render</text>

  <!-- REWARD -->
  <text x="600" y="90" class="band">SHARED REWARD</text>
  <rect x="600" y="100" width="340" height="120" rx="12" class="card" stroke="#f4b740"/>
  <text x="620" y="126" class="lbl">Modular shaped reward</text>
  <text x="620" y="148" class="sub">speed · progress · lane-keeping · heading</text>
  <text x="620" y="166" class="sub">steering &amp; jerk (comfort) · collision · off-road</text>
  <text x="620" y="190" class="sub">Identical objective for both backends →</text>
  <text x="620" y="206" class="sub">train on fallback, transfer to CARLA</text>

  <!-- AGENT -->
  <text x="40" y="262" class="band">AGENT · observation → action</text>
  <rect x="40" y="272" width="170" height="96" rx="12" class="card" stroke="#4f9cff"/>
  <text x="60" y="298" class="lbl">Observation</text>
  <text x="60" y="318" class="sub">image 84×84×3</text>
  <text x="60" y="334" class="sub">or state vector</text>
  <text x="60" y="354" class="sub">+ frame stack</text>

  <rect x="240" y="272" width="190" height="96" rx="12" class="card" stroke="#4f9cff"/>
  <text x="260" y="298" class="lbl">Perception</text>
  <text x="260" y="318" class="sub">CNN extractor (image):</text>
  <text x="260" y="334" class="sub">NatureCNN / IMPALA</text>
  <text x="260" y="354" class="sub">MLP (state)</text>

  <rect x="460" y="272" width="170" height="96" rx="12" class="card" stroke="#4f9cff"/>
  <text x="480" y="298" class="lbl">Policy</text>
  <text x="480" y="318" class="sub">Actor-Critic (PPO)</text>
  <text x="480" y="334" class="sub">Actor + twin-Q (SAC)</text>
  <text x="480" y="354" class="sub">→ [steer, throttle]</text>

  <!-- TRAINING -->
  <text x="660" y="262" class="band">TRAINING · Stable-Baselines3</text>
  <rect x="660" y="272" width="280" height="96" rx="12" class="card" stroke="#7c5cff"/>
  <text x="680" y="298" class="lbl">PPO (on-policy) · SAC (off-policy)</text>
  <text x="680" y="318" class="sub">Callbacks: Eval · Checkpoint</text>
  <text x="680" y="334" class="sub">RewardComponents · TensorBoard</text>
  <text x="680" y="354" class="sub">→ runs/ (best_model, checkpoints, tb)</text>

  <!-- EVAL -->
  <text x="40" y="410" class="band">EVALUATION &amp; REPORTING</text>
  <rect x="40" y="420" width="190" height="92" rx="12" class="card" stroke="#f4b740"/>
  <text x="60" y="446" class="lbl">Rollouts</text>
  <text x="60" y="466" class="sub">PPO · SAC · PID · Stanley</text>
  <text x="60" y="482" class="sub">deterministic episodes</text>
  <text x="60" y="500" class="sub">on identical routes</text>

  <rect x="260" y="420" width="220" height="92" rx="12" class="card" stroke="#f4b740"/>
  <text x="280" y="446" class="lbl">Metrics</text>
  <text x="280" y="466" class="sub">route completion · collisions</text>
  <text x="280" y="482" class="sub">lateral error · steering jerk</text>
  <text x="280" y="500" class="sub">speed · success rate</text>

  <rect x="510" y="420" width="200" height="92" rx="12" class="card" stroke="#f4b740"/>
  <text x="530" y="446" class="lbl">results/summary.json</text>
  <text x="530" y="466" class="sub">per-agent metrics</text>
  <text x="530" y="482" class="sub">+ return distributions</text>
  <text x="530" y="500" class="sub">versioned, mergeable</text>

  <rect x="740" y="420" width="200" height="92" rx="12" class="card" stroke="#f4b740"/>
  <text x="760" y="446" class="lbl">HTML dashboard</text>
  <text x="760" y="466" class="sub">interactive comparison</text>
  <text x="760" y="482" class="sub">+ static figures</text>
  <text x="760" y="500" class="sub">(matplotlib PNGs)</text>

  <!-- CI -->
  <rect x="40" y="556" width="900" height="74" rx="12" fill="#10151c" stroke="#232a34"/>
  <text x="60" y="582" class="band">CI / CD · GitHub Actions</text>
  <text x="60" y="606" class="sub">quality (ruff · black · mypy)  →  tests (pytest, py3.9 &amp; 3.11, coverage)  →  smoke-e2e (train + eval + dashboard)</text>
  <text x="60" y="622" class="sub">Docker image · docker-compose (CARLA + trainer) · pre-commit hooks · Makefile targets</text>

  <!-- arrows -->
  <path class="flow" d="M165,220 L165,272"/>
  <path class="flow" d="M435,220 L300,272"/>
  <path class="flow" d="M210,320 L240,320"/>
  <path class="flow" d="M430,320 L460,320"/>
  <path class="flow" d="M630,320 L660,320"/>
  <path class="flow" d="M770,220 L770,272"/>
  <path class="flow" d="M545,368 L545,420"/>
  <path class="flow" d="M230,466 L260,466"/>
  <path class="flow" d="M480,466 L510,466"/>
  <path class="flow" d="M710,466 L740,466"/>
  <text x="556" y="392" class="sub">action ↺ env</text>
</svg>
