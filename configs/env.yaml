# Shared environment configuration. Both the CARLA env and the fallback env read
# these keys so an agent trained against one interface transfers to the other.

env:
  # Observation mode: "state" (low-dim vector) or "image" (front camera / top-down).
  observation: image
  image_size: [84, 84]          # (H, W) for image observations
  frame_stack: 4                # number of stacked frames (temporal context)
  action_repeat: 2              # apply each action for N sim steps (frame-skip)
  max_episode_steps: 1000
  # Continuous action space: [steering, throttle_brake] each in [-1, 1].
  # throttle_brake > 0 -> throttle, < 0 -> brake.
  normalize_actions: true

# Modular reward weights (see ad_rl/rewards/reward.py).
reward:
  target_speed_kmh: 30.0
  w_speed: 1.0                  # reward for matching target speed
  w_progress: 1.0              # reward for distance progressed along the route
  w_lane: 0.5                   # penalty for lateral deviation from lane center
  w_heading: 0.3               # penalty for heading error vs lane direction
  w_steer: 0.1                 # penalty for steering magnitude (comfort)
  w_jerk: 0.1                  # penalty for action change (comfort / smoothness)
  collision_penalty: 50.0      # one-off penalty + episode termination
  offroad_penalty: 25.0        # one-off penalty + episode termination

# CARLA-specific settings (ignored by the fallback env).
carla:
  host: localhost
  port: 2000
  timeout: 20.0
  town: Town03
  fixed_delta_seconds: 0.05    # 20 Hz simulation
  synchronous: true
  num_vehicles: 30             # background traffic
  num_walkers: 10
  weather: ClearNoon
  ego_vehicle: vehicle.tesla.model3
  route_length_m: 200.0

# Fallback (simulator-free) kinematic environment settings.
fallback:
  dt: 0.1                       # integration timestep (s)
  wheelbase_m: 2.8
  max_speed_kmh: 50.0
  road_half_width_m: 2.0        # off-road if |lateral error| exceeds this
  curviness: 0.6                # 0=straight road, 1=very curvy procedural track
  num_obstacles: 3             # static obstacles to avoid (collision source)
