# SAC configuration — off-policy, maximum-entropy RL.
# Reference: Haarnoja et al. (2018), arXiv:1801.01290
#
# SAC is preferable to PPO when simulator steps are expensive (CARLA),
# as the replay buffer enables re-use of historical experience.
# For the lightweight fallback env, PPO typically converges faster.

defaults: env.yaml

algorithm: sac
seed: 1

total_timesteps: 500000

# SAC is inherently single-environment (off-policy); n_envs=1 is standard.
n_envs: 1

policy:
  type: auto
  features_extractor: nature_cnn
  features_dim: 256
  net_arch: [256, 256]
  activation: relu

hyperparameters:
  learning_rate: 3.0e-4
  buffer_size: 300000
  learning_starts: 5000
  batch_size: 256
  tau: 0.005              # soft target network update coefficient
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1       # increase to 2–4 for higher sample efficiency
  ent_coef: auto          # automatic entropy temperature tuning
  target_update_interval: 1
  use_sde: false          # set true for state-dependent exploration (smoother control)

logging:
  eval_freq: 10000
  eval_episodes: 5
  checkpoint_freq: 25000
  tensorboard: true
  save_video: false
