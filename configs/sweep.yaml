# Optuna hyperparameter search space for PPO on the fallback environment.
# Used by scripts/hparam_sweep.py
# Reference: https://optuna.readthedocs.io/

defaults: ppo.yaml

study_name: ppo_fallback_sweep
env: fallback
obs: state
total_timesteps: 200000
n_envs: 4
eval_episodes: 10
n_trials: 50
direction: maximize   # maximise mean episodic return

search_space:
  learning_rate:
    type: float
    low: 1.0e-4
    high: 1.0e-3
    log: true
  n_steps:
    type: categorical
    choices: [512, 1024, 2048]
  batch_size:
    type: categorical
    choices: [64, 128, 256, 512]
  n_epochs:
    type: int
    low: 4
    high: 20
  gamma:
    type: float
    low: 0.95
    high: 0.9999
    log: true
  gae_lambda:
    type: float
    low: 0.90
    high: 0.99
  clip_range:
    type: float
    low: 0.1
    high: 0.4
  ent_coef:
    type: float
    low: 0.0
    high: 0.02
  max_grad_norm:
    type: float
    low: 0.3
    high: 1.0
  target_kl:
    type: float
    low: 0.01
    high: 0.05

# Pruner configuration (stop unpromising trials early)
pruner:
  type: median
  n_startup_trials: 5
  n_warmup_steps: 50000
